[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "battinfo"
version = "0.1.0"
description = "Implementation and interoperability layer for the domain-battery ontology."
readme = "README.md"
requires-python = ">=3.10"
license = "GPL-2.0-only"
license-files = ["LICENSE"]
authors = [
  { name = "BattINFO Team" }
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Topic :: Scientific/Engineering",
]
dependencies = [
  "pydantic>=2.7",
  "typer>=0.12",
  "rich>=13.7",
  "jsonschema>=4.21",
  "pandas>=2.2",
  "pyarrow>=15.0",
  "openpyxl>=3.1",
  "rdflib>=7.0",
  "pyld>=2.0.4"
]

[project.optional-dependencies]
storage = [
  "boto3>=1.34"
]
processing = [
  "batterydf>=0.1",
  "matplotlib>=3.8",
  "plotly>=5.20",
]
dev = [
  "build>=1.2",
  "datamodel-code-generator>=0.25",
  "ruff>=0.6",
  "pytest>=8.0"
]

[project.scripts]
battinfo = "battinfo.cli:app"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
battinfo = ["data/**/*"]

[tool.setuptools.exclude-package-data]
battinfo = ["**/__pycache__/*", "**/*.py[cod]"]

[tool.pytest.ini_options]
norecursedirs = ["legacy"]
