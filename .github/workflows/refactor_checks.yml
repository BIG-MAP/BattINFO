name: Refactor Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Package + Dev Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Unit Tests
        run: python -m pytest -q tests

      - name: Lint Identifier Policy Compliance
        run: python scripts/lint_identifier_policy.py

      - name: Validate Canonical cells-clean Dataset
        run: python scripts/validate_cells_clean.py

      - name: Build Resolver Artifacts
        run: python scripts/build_resolver_artifacts.py
