name: Refactor Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    defaults:
      run:
        shell: bash   # consistent shell on Windows so the wheel-smoke glob + pip steps work
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Package + Dependencies (locked)
        run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type Check (mypy)
        run: uv run mypy

      - name: Run Unit Tests + Coverage Gate
        run: uv run pytest -q tests --cov=battinfo --cov-report=term-missing

      - name: Lint Identifier Policy Compliance
        run: uv run python .tools/quality/lint_identifier_policy.py

      - name: Run Alpha Verification Gate
        run: uv run python .tools/quality/run_alpha_verification.py

      - name: Smoke Test Installed Wheel
        run: |
          uv build
          uv pip install --reinstall dist/*.whl
          uv run --no-sync python tests/installed_smoke.py
