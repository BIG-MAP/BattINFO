name: Refactor Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    defaults:
      run:
        shell: bash   # consistent shell on Windows so the wheel-smoke glob + pip steps work
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Package + Dev Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Type Check (mypy)
        run: python -m mypy

      - name: Run Unit Tests + Coverage Gate
        run: python -m pytest -q tests --cov=battinfo --cov-report=term-missing

      - name: Lint Identifier Policy Compliance
        run: python .tools/quality/lint_identifier_policy.py

      - name: Run Alpha Verification Gate
        run: python .tools/quality/run_alpha_verification.py

      - name: Smoke Test Installed Wheel
        run: |
          python -m pip uninstall -y battinfo
          python -m pip install dist/*.whl
          python tests/installed_smoke.py
