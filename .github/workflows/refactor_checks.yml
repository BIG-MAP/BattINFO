name: Refactor Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        shell: bash   # consistent shell on Windows so the wheel-smoke glob + pip steps work
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Package + Dependencies (locked)
        run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}

      # NOTE: the tool steps below use `--no-sync` so they reuse the
      # `--all-extras` venv created above. Without it, a bare `uv run` re-reads
      # `.python-version` (3.11), recreates the venv with default deps only, and
      # the dev tools (ruff/mypy/pytest) disappear — which also breaks the
      # non-default (3.12) matrix leg.
      - name: Lint (ruff)
        run: uv run --no-sync ruff check src tests

      - name: Type Check (mypy)
        run: uv run --no-sync mypy

      - name: Run Unit Tests + Coverage Gate
        run: uv run --no-sync pytest -q tests --cov=battinfo --cov-report=term-missing

      - name: Lint Identifier Policy Compliance
        run: uv run --no-sync python .tools/quality/lint_identifier_policy.py

      - name: Run Alpha Verification Gate
        run: uv run --no-sync python .tools/quality/run_alpha_verification.py

      - name: Smoke Test Installed Wheel
        run: |
          uv build
          uv pip install --reinstall dist/*.whl
          uv run --no-sync python tests/installed_smoke.py

      - name: Validate Distribution Metadata (twine check)
        run: uv run --no-sync python -m twine check dist/*
