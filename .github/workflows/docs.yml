name: Docs

# Builds the Sphinx documentation and checks that the guide notebooks parse,
# so docs and the advertised notebooks cannot silently rot.
#
# The build is strict (-W): any Sphinx warning fails the job. Notebook
# *execution* (nbmake) is deferred — the notebooks ship with stored outputs
# (nbsphinx_execute = "never"), so this renders them without a kernel.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install pandoc (required by nbsphinx to render notebooks)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc
      - name: Install (locked, all extras)
        run: uv sync --all-extras --frozen
      - name: Sphinx build (warnings are errors)
        env:
          DOCS_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}
        run: uv run --no-sync sphinx-build -b html -W --keep-going docs docs/_build/html
      - name: Validate guide notebooks parse
        run: |
          uv run --no-sync python - <<'PY'
          import glob, nbformat
          nbs = sorted(glob.glob("docs/guides/*.ipynb"))
          for nb in nbs:
              nbformat.read(nb, as_version=4)
          print(f"OK: {len(nbs)} notebooks parsed")
          PY
      - name: Upload rendered site
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html

  # Versioned deploy to gh-pages: main -> dev/, tags -> vX.Y.Z/ + stable/,
  # switcher.json regenerated from the published version directories.
  # (Requires GitHub Pages to be enabled from the gh-pages branch.)
  deploy:
    name: Deploy versioned docs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: docs-html
          path: docs/_build/html
      - name: Deploy to GitHub Pages
        env:
          DOCS_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}
        run: bash .github/workflows/docs-deploy.sh "$DOCS_VERSION"
