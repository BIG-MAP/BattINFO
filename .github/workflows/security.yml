name: Security

# Dependency and code-security scanning for long-term deployment.
# Runs on pushes to main, on PRs, and weekly so newly-disclosed advisories
# are caught even without a code change.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Export locked dependency graph
        run: uv export --no-emit-project --all-extras --format requirements-txt > requirements-audit.txt
      - name: Audit dependencies (OSV / PyPI advisories)
        run: uvx pip-audit -r requirements-audit.txt

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # Pure-Python project: no build, analyze the source as-is.
          build-mode: none
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
