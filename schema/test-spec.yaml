id: https://w3id.org/battinfo/schema/test-spec
name: battinfo-test-spec
description: >-
  Schema for TestSpec (test protocol specification) records.
  A TestSpec describes a procedure (steps, conditions, setpoints) that can be
  referenced by one or more Test execution records via prov:used.

prefixes:
  linkml:   https://w3id.org/linkml/
  battinfo: https://w3id.org/battinfo/

default_prefix: battinfo
default_range: string

imports:
  - types

classes:

  TestSpec:
    class_uri: battinfo:TestSpec
    description: >-
      A test protocol specification (plan) that defines the procedure for a
      battery test.  Referenced by Test instances via prov:used.
    slots:
      - ts_id
      - ts_name
      - ts_kind
      - ts_description
      - ts_version
      - ts_protocol
      - ts_steps
      - ts_cycles
      - ts_method
      - ts_record
      - ts_safety
      - ts_conditions
      - ts_artifacts

slots:

  ts_id:
    slot_uri: schema:productID
    identifier: true
    range: SpecIri
    description: Canonical IRI for this test specification.
    aliases:
      - id

  ts_name:
    slot_uri: schema:name
    required: true
    range: string
    description: Human-readable name of the test protocol.
    aliases:
      - name

  ts_kind:
    slot_uri: battinfo:testKind
    required: true
    range: BatteryTestType
    description: Test type from the BatteryTestType controlled vocabulary.
    aliases:
      - kind
      - test_type

  ts_description:
    slot_uri: schema:description
    range: string
    description: Free-text description of the protocol.
    aliases:
      - description

  ts_version:
    slot_uri: schema:version
    range: string
    description: Version string of this protocol specification.
    aliases:
      - version

  ts_protocol:
    slot_uri: battinfo:protocolReference
    range: ProtocolInfo
    description: Reference to the formal protocol standard document.
    aliases:
      - protocol

  ts_steps:
    slot_uri: battinfo:steps
    range: string
    multivalued: true
    description: >-
      PyBaMM-compatible experiment step strings (the default human authoring
      interface, e.g. "Discharge at 1C until 2.5 V"). Parsed into ts_method on
      ingest; ts_method is the canonical stored form.
    aliases:
      - steps
      - experiment

  ts_cycles:
    slot_uri: battinfo:cycles
    range: integer
    minimum_value: 1
    description: >-
      Number of times the authored step sequence is repeated (becomes an
      IterativeWorkflow group in ts_method).
    aliases:
      - cycles

  ts_method:
    slot_uri: battinfo:method
    range: string
    description: >-
      Canonical structured method: an ordered, typed list of steps as a JSON
      array. Each step carries mode/direction, setpoints, termination and
      optional nested groups; emitted to JSON-LD as an EMMO process graph.
    aliases:
      - method

  ts_record:
    slot_uri: battinfo:record
    range: string
    description: >-
      Protocol-level default data-recording cadence as a JSON object
      (e.g. {"time_s": 10}).
    aliases:
      - record

  ts_safety:
    slot_uri: battinfo:safety
    range: string
    description: >-
      Global instrument safety limits as a JSON object, distinct from per-step
      termination (e.g. {"max_voltage_V": 4.3, "min_voltage_V": 2.4}).
    aliases:
      - safety

  ts_conditions:
    slot_uri: battinfo:conditions
    range: string
    description: >-
      Protocol-level ambient conditions as a JSON object of typed quantities
      (e.g. {"temperature": {"value": 25, "unit": "degC"}}).
    aliases:
      - conditions

  ts_artifacts:
    slot_uri: battinfo:artifacts
    range: string
    multivalued: true
    description: >-
      Links to machine-actionable protocol files (the actionable layer). Each
      entry is a JSON object with role/format/locator and optional checksum.
    aliases:
      - artifacts
