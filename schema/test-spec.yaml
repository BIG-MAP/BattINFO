id: https://w3id.org/battinfo/schema/test-spec
name: battinfo-test-spec
description: >-
  Schema for TestSpec (test protocol specification) records.
  A TestSpec describes a procedure (steps, conditions, setpoints) that can be
  referenced by one or more Test execution records via prov:used.

prefixes:
  linkml:   https://w3id.org/linkml/
  battinfo: https://w3id.org/battinfo/

default_prefix: battinfo
default_range: string

imports:
  - types

classes:

  TestSpec:
    class_uri: battinfo:TestSpec
    description: >-
      A test protocol specification (plan) that defines the procedure for a
      battery test.  Referenced by Test instances via prov:used.
    slots:
      - ts_id
      - ts_name
      - ts_kind
      - ts_description
      - ts_version
      - ts_protocol
      - ts_steps
      - ts_cycles
      - ts_conditions
      - ts_setpoints
      - ts_termination_criteria
      - ts_measurement_outputs

slots:

  ts_id:
    slot_uri: schema:productID
    identifier: true
    range: SpecIri
    description: Canonical IRI for this test specification.
    aliases:
      - id

  ts_name:
    slot_uri: schema:name
    required: true
    range: string
    description: Human-readable name of the test protocol.
    aliases:
      - name

  ts_kind:
    slot_uri: battinfo:testKind
    required: true
    range: BatteryTestType
    description: Test type from the BatteryTestType controlled vocabulary.
    aliases:
      - kind
      - test_type

  ts_description:
    slot_uri: schema:description
    range: string
    description: Free-text description of the protocol.
    aliases:
      - description

  ts_version:
    slot_uri: schema:version
    range: string
    description: Version string of this protocol specification.
    aliases:
      - version

  ts_protocol:
    slot_uri: battinfo:protocolReference
    range: ProtocolInfo
    description: Reference to the formal protocol standard document.
    aliases:
      - protocol

  ts_steps:
    slot_uri: battinfo:steps
    range: string
    multivalued: true
    description: >-
      Ordered list of PyBaMM-compatible experiment step strings
      (e.g. "Discharge at 1C until 2.5 V").
    aliases:
      - steps

  ts_cycles:
    slot_uri: battinfo:cycles
    range: integer
    minimum_value: 1
    description: Number of times the step sequence is repeated.
    aliases:
      - cycles

  ts_conditions:
    slot_uri: battinfo:conditions
    range: string
    description: >-
      Free-form JSON object of environmental conditions
      (e.g. {"temperature_degC": 25}).
    aliases:
      - conditions

  ts_setpoints:
    slot_uri: battinfo:setpoints
    range: string
    description: >-
      Free-form JSON object of instrument setpoints
      (e.g. {"current_A": 1.5}).
    aliases:
      - setpoints

  ts_termination_criteria:
    slot_uri: battinfo:terminationCriteria
    range: string
    description: >-
      Free-form JSON object of termination criteria
      (e.g. {"voltage_V": 2.5, "time_h": 10}).
    aliases:
      - termination_criteria

  ts_measurement_outputs:
    slot_uri: battinfo:measurementOutputs
    range: string
    multivalued: true
    description: >-
      List of measurement output descriptors specifying which quantities
      the cycler should record during this protocol.
    aliases:
      - measurement_outputs
